<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Project Web Saya</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 40px 20px;
            color: #333;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 1.8rem;
            color: #2c3e50;
            margin-bottom: 5px;
            text-align: center;
        }
        p.subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .project-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .project-item {
            margin-bottom: 12px;
        }
        .project-link {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background-color: #f8f9fa;
            color: #2980b9;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            border: 1px solid #e9ecef;
            transition: all 0.2s ease;
        }
        .project-link:hover {
            background-color: #3498db;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(52, 152, 219, 0.2);
        }
        .project-link::before {
            content: "📁";
            margin-right: 12px;
            font-size: 1.2rem;
        }
        .loading {
            text-align: center;
            color: #7f8c8d;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>My Repository Showcases</h1>
    <p class="subtitle">Pilih folder di bawah ini untuk melihat demo proyek langsung:</p>
    
    <ul id="list-project" class="project-list">
        <li class="loading">Memuat daftar folder proyek...</li>
    </ul>
</div>

<script>
    const listElement = document.getElementById('list-project');

    async function loadFolders() {
        try {
            // Mengambil username dan nama repo secara OTOMATIS dari URL GitHub Pages Anda
            // Contoh URL: https://username.github.io/nama-repo/
            const pathParts = window.location.pathname.split('/').filter(p => p !== '');
            const hostParts = window.location.hostname.split('.');
            
            const USERNAME = hostParts[0]; 
            const REPO = pathParts[0]; 

            // Validasi jika dibuka bukan di github.io (misal saat testing lokal)
            if (!window.location.hostname.includes('github.io') || !REPO) {
                listElement.innerHTML = `
                    <li class='loading' style='color: #e67e22;'>
                        Deteksi otomatis gagal karena dibuka secara lokal.<br>
                        <small>Silakan commit & push kode ini ke GitHub untuk melihat hasilnya aktif.</small>
                    </li>`;
                return;
            }

            const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents`);
            if (!response.ok) throw new Error("Gagal mengambil isi repo.");
            
            const data = await response.json();
            listElement.innerHTML = ""; 

            // Menyaring hanya item yang bertipe folder dan bukan folder sistem seperti .github
            const folders = data.filter(item => item.type === 'dir' && !item.name.startsWith('.'));

            if (folders.length === 0) {
                listElement.innerHTML = "<li class='loading'>Tidak ada folder proyek yang ditemukan di repositori ini.</li>";
                return;
            }

            folders.forEach(folder => {
                const li = document.createElement('li');
                li.className = 'project-item';
                
                const a = document.createElement('a');
                a.className = 'project-link';
                a.href = `./${folder.name}/`; 
                a.textContent = folder.name;
                
                li.appendChild(a);
                listElement.appendChild(li);
            });

        } catch (error) {
            console.error(error);
            listElement.innerHTML = "<li class='loading' style='color: #e74c3c;'>Gagal memuat daftar folder. Pastikan repositori Anda bersifat Publik.</li>";
        }
    }

    loadFolders();
</script>

</body>
</html>
