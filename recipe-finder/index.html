<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recipe Finder App</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-utensils"></i> Recipe Finder</h1>
            <p>Find delicious recipes from around the world</p>
        </header>

        <p class="api-link">Data from <a href="https://www.themealdb.com/api.php" target="_blank">TheMealDB 🧑‍🍳</a></p>

        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search for a meals or keywords...">
            <button id="search-btn">Search</button>
        </div>

        <div id="error-container" class="hidden"></div>

        <div id="result-heading"></div>

        <div id="meals"></div>

        <div id="meal-details" class="hidden">
            <button id="back-btn"><i class="fas fa-arrow-left"></i> Back to recipes</button>
            <div class="meal-details-content"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
